<title>Esplora l'Italia</title>
<meta name="theme-color" content="#102b30">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --notte: #102b30;
    --notte-2: #16383f;
    --carta: #f4ead2;
    --terracotta: #c1502e;
    --terracotta-2: #e0743f;
    --oro: #e4a73b;
    --oliva: #7a8f5c;
    --testo-chiaro: #f4ead2;
    --testo-fioco: #b9c9c4;
    --ombra: rgba(0,0,0,0.35);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--notte);
    color: var(--testo-chiaro);
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body{
    background-image:
      radial-gradient(circle at 15% 0%, rgba(228,167,59,0.10), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(193,80,46,0.12), transparent 45%);
  }

  .contenitore{
    max-width: 560px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ---------- HEADER ---------- */
  .eyebrow{
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--oro);
    font-weight: 700;
    margin: 0 0 6px 2px;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2.5rem;
    line-height: 1.05;
    margin: 0 0 10px 0;
    color: var(--carta);
  }

  h1 em{
    font-style: italic;
    color: var(--terracotta-2);
  }

  .sottotitolo{
    font-size: 0.95rem;
    color: var(--testo-fioco);
    line-height: 1.5;
    margin: 0 0 26px 0;
    max-width: 42ch;
  }

  /* ---------- SELETTORE CITTÀ ---------- */
  .sezione-label{
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--testo-fioco);
    font-weight: 700;
    margin: 0 0 12px 2px;
  }

  /* ---------- BARRA DI RICERCA ---------- */
  .barra-ricerca{
    position: relative;
    margin-bottom: 6px;
  }

  .campo-ricerca{
    width: 100%;
    background: var(--notte-2);
    border: 1.5px solid rgba(244,234,210,0.14);
    border-radius: 14px;
    padding: 15px 46px 15px 16px;
    font-family: 'Manrope', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--carta);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .campo-ricerca::placeholder{ color: var(--testo-fioco); font-weight: 500; }
  .campo-ricerca:focus{
    border-color: var(--oro);
    box-shadow: 0 0 0 3px rgba(228,167,59,0.15);
  }

  .icona-ricerca{
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    border: 2px solid var(--testo-fioco);
    border-radius: 50%;
    pointer-events: none;
  }
  .icona-ricerca::after{
    content: '';
    position: absolute;
    width: 8px; height: 2px;
    background: var(--testo-fioco);
    bottom: -6px; right: -3px;
    transform: rotate(45deg);
  }

  .stato-ricerca{
    font-size: 0.76rem;
    color: var(--testo-fioco);
    margin: 8px 2px 0 2px;
    min-height: 16px;
  }
  .stato-ricerca.errore{ color: var(--terracotta-2); }
  .stato-ricerca.ok{ color: var(--oliva); }

  .elenco-suggerimenti{
    position: absolute;
    left: 0; right: 0; top: calc(100% + 6px);
    background: var(--notte-2);
    border: 1px solid rgba(244,234,210,0.12);
    border-radius: 14px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 20;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    display: none;
  }
  .elenco-suggerimenti.visibile{ display: block; }

  .suggerimento{
    padding: 12px 16px;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--testo-chiaro);
    cursor: pointer;
    border-bottom: 1px solid rgba(244,234,210,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .suggerimento:last-child{ border-bottom: none; }
  .suggerimento:active,
  .suggerimento.attivo{ background: rgba(228,167,59,0.12); }

  .suggerimento .provincia{
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--oro);
    white-space: nowrap;
  }

  /* ---------- SELETTORE REGIONE ---------- */
  .barra-regione{
    position: relative;
  }

  .campo-regione{
    width: 100%;
    background: var(--notte-2);
    border: 1.5px solid rgba(244,234,210,0.14);
    border-radius: 14px;
    padding: 15px 46px 15px 16px;
    font-family: 'Manrope', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--carta);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .campo-regione.disattivo{ color: var(--testo-fioco); opacity: 0.7; cursor: not-allowed; pointer-events: none; }
  .campo-regione:focus{
    outline: none;
    border-color: var(--oro);
    box-shadow: 0 0 0 3px rgba(228,167,59,0.15);
  }

  .icona-tendina{
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-65%) rotate(45deg);
    width: 8px; height: 8px;
    border-right: 2px solid var(--oro);
    border-bottom: 2px solid var(--oro);
    pointer-events: none;
  }

  .campo-ricerca:disabled{ opacity: 0.55; cursor: not-allowed; }

  .senza-dati{
    background: var(--notte-2);
    border: 1px dashed rgba(244,234,210,0.18);
    border-radius: 16px;
    padding: 22px 18px;
    margin-top: 14px;
    font-size: 0.88rem;
    color: var(--testo-fioco);
    line-height: 1.55;
  }
  .senza-dati strong{ color: var(--carta); }

  /* ---------- STATO VUOTO ---------- */
  .stato-vuoto{
    text-align: center;
    padding: 50px 20px;
    color: var(--testo-fioco);
    font-size: 0.9rem;
    border: 1px dashed rgba(244,234,210,0.15);
    border-radius: 16px;
    margin-top: 10px;
  }

  /* ---------- BLOCCO CITTÀ ATTIVA ---------- */
  .blocco{ display:none; margin-top: 22px; animation: comparsa 0.35s ease; }
  .blocco.visibile{ display:block; }

  @keyframes comparsa{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .titolo-blocco{
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--carta);
    margin: 26px 0 4px 0;
  }
  .sotto-blocco{
    font-size: 0.82rem;
    color: var(--testo-fioco);
    margin: 0 0 14px 0;
  }

  /* ---------- CARD ATTRAZIONE (accordion) ---------- */
  .biglietto{
    background: var(--notte-2);
    border-radius: 14px;
    border-left: 3px solid var(--oro);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .biglietto-intestazione{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 15px 16px;
    cursor: pointer;
  }

  .biglietto-numero{
    font-family: 'Fraunces', serif;
    font-size: 0.78rem;
    color: var(--oro);
    min-width: 22px;
  }

  .biglietto-nome{
    font-weight: 700;
    font-size: 0.98rem;
    color: var(--carta);
    flex: 1;
  }

  .biglietto-freccia{
    color: var(--oro);
    font-size: 1.1rem;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }
  .biglietto.aperto .biglietto-freccia{ transform: rotate(180deg); }

  .biglietto-corpo{
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 16px;
  }
  .biglietto.aperto .biglietto-corpo{
    max-height: 300px;
    padding: 0 16px 18px 16px;
  }

  .biglietto-corpo p{
    margin: 0;
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--testo-fioco);
    border-top: 1px solid rgba(244,234,210,0.08);
    padding-top: 12px;
  }

  /* ---------- SEZIONE OGGI ---------- */
  .oggi-card{
    background: linear-gradient(155deg, rgba(122,143,92,0.14), rgba(122,143,92,0.03));
    border: 1px solid rgba(122,143,92,0.3);
    border-radius: 16px;
    padding: 18px 18px 16px;
    margin-top: 8px;
  }

  .oggi-data{
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--oliva);
    font-weight: 700;
    margin: 0 0 4px 0;
  }

  .oggi-titolo{
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    color: var(--carta);
    margin: 0 0 12px 0;
  }

  .evento-riga{
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 9px 0;
    border-top: 1px solid rgba(244,234,210,0.08);
  }
  .evento-riga:first-of-type{ border-top: none; }

  .evento-pallino{
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--oliva);
    margin-top: 6px;
    flex-shrink: 0;
  }

  .evento-testo{ font-size: 0.87rem; color: var(--testo-chiaro); line-height: 1.45; }

  .nessun-evento{
    font-size: 0.85rem;
    color: var(--testo-fioco);
    line-height: 1.5;
  }

  footer{
    text-align:center;
    color: rgba(244,234,210,0.35);
    font-size: 0.72rem;
    margin-top: 40px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="contenitore">
  <h1>Esplora <em>l'Italia</em></h1>

  <p class="sezione-label">Regione</p>
  <div class="barra-regione">
    <div id="campo-regione" class="campo-regione disattivo" tabindex="0">Caricamento regioni...</div>
    <span class="icona-tendina"></span>
    <div class="elenco-suggerimenti" id="elenco-regioni"></div>
  </div>

  <p class="sezione-label" style="margin-top:18px;">Città o paese</p>
  <div class="barra-ricerca">
    <input
      type="text"
      id="campo-ricerca"
      class="campo-ricerca"
      placeholder="Prima scegli una regione"
      autocomplete="off"
      autocapitalize="words"
      spellcheck="false"
      disabled
    />
    <span class="icona-ricerca"></span>
    <div class="elenco-suggerimenti" id="elenco-suggerimenti"></div>
  </div>
  <p class="stato-ricerca" id="stato-ricerca">Caricamento dell'elenco comuni italiani (ISTAT)...</p>

  <div class="stato-vuoto" id="stato-vuoto">Scegli prima una regione, poi scrivi una città o un paese</div>

  <div class="senza-dati" id="senza-dati" style="display:none;"></div>

  <div class="blocco" id="blocco-attrazioni">

    <div id="lista-attrazioni"></div>
  </div>

  <div class="blocco" id="blocco-oggi">
    <div class="oggi-card">
      <p class="oggi-data" id="oggi-data"></p>
      <p class="oggi-titolo" id="oggi-titolo">Oggi in città</p>
      <div id="lista-eventi"></div>
    </div>
  </div>

  <footer>Dati dimostrativi — Italia</footer>
</div>

// ---------------------------------------------------------------
// CARICAMENTO ELENCO UFFICIALE DI TUTTI I COMUNI ITALIANI (ISTAT)
// Fonte: dataset pubblico "comuni-json" (7.904 comuni, aggiornato),
// da cui ricaviamo anche l'elenco delle 20 regioni per il primo filtro.
// ---------------------------------------------------------------
let comuni = [];          // [{nome, provincia, regione}]
let comuniPronti = false;
let elencoRidotto = false; // true se usiamo la lista di riserva più corta
let regioneSelezionata = "";

const URL_COMUNI = "https://raw.githubusercontent.com/matteocontrini/comuni-json/master/comuni.json";

// piccola lista di riserva usata solo se il caricamento online fallisce
// (es. nessuna connessione internet) — qui manca il dato regione,
// quindi in questo caso il selettore regione viene disattivato.
const COMUNI_RISERVA = [
  "Roma","Milano","Napoli","Torino","Palermo","Genova","Bologna","Firenze",
  "Bari","Catania","Venezia","Verona","Messina","Padova","Trieste","Brescia",
  "Taranto","Prato","Parma","Modena","Reggio Calabria","Reggio Emilia","Perugia",
  "Livorno","Ravenna","Cagliari","Foggia","Rimini","Salerno","Ferrara","Sassari",
  "Latina","Giugliano in Campania","Monza","Siracusa","Pescara","Bergamo","Forlì",
  "Trento","Vicenza","Terni","Bolzano","Novara","Piacenza","Ancona","Andria",
  "Arezzo","Udine","Cesena","Lecce","Pesaro","La Spezia","Alessandria","Barletta",
  "Catanzaro","Pistoia","Como","Guidonia Montecelio","Pisa","Lucca","Brindisi",
  "Torre del Greco","Treviso","Grosseto","Busto Arsizio","Sesto San Giovanni",
  "Orvieto","Positano","Alba","Assisi","Matera","Cortina d'Ampezzo","Portofino",
  "Sorrento","Amalfi","Siena","San Gimignano","Cinque Terre","Taormina","Otranto",
  "Ostuni","Polignano a Mare","Tropea","Alberobello","Ravello","Vernazza",
];

fetch(URL_COMUNI)
  .then(risposta => {
    if (!risposta.ok) throw new Error("risposta non valida");
    return risposta.json();
  })
  .then(dati => {
    comuni = dati.map(c => ({
      nome: c.nome,
      provincia: (c.provincia && c.provincia.nome) ? c.provincia.nome : "",
      regione: (c.regione && c.regione.nome) ? c.regione.nome : ""
    }));
    comuniPronti = true;
    popolaRegioni();
    statoRicerca.textContent = `Elenco caricato: ${comuni.length} comuni italiani pronti alla ricerca.`;
    statoRicerca.className = 'stato-ricerca ok';
  })
  .catch(() => {
    // riserva usata quando il download fallisce — spesso NON è mancanza
    // di internet, ma il browser che blocca le richieste esterne quando
    // la pagina è aperta come file locale (protocollo file://).
    comuni = COMUNI_RISERVA.map(nome => ({ nome, provincia: "", regione: "" }));
    comuniPronti = true;
    elencoRidotto = true;
    regioneSelezionata = "TUTTE"; // niente filtro per regione in questa modalità
    abilitaRicerca("Es. Roma, Orvieto, Positano...");

    if (location.protocol === 'file:'){
      campoRegione.textContent = "Non disponibile (file aperto localmente)";
      campoRegione.classList.add('disattivo');
      statoRicerca.textContent = "Stai aprendo il file direttamente dal telefono: il browser blocca le richieste a internet in questa modalità, anche se sei online. Uso una lista ridotta di città. Per la ricerca completa, il file va aperto da un indirizzo web (non da file locale) — chiedimi come.";
    } else {
      campoRegione.textContent = "Elenco non disponibile";
      campoRegione.classList.add('disattivo');
      statoRicerca.textContent = "Non sono riuscito a scaricare l'elenco completo (controlla la connessione). Uso una lista ridotta di città, senza filtro per regione.";
    }
    statoRicerca.className = 'stato-ricerca errore';
  });

// ---------------------------------------------------------------
// SELETTORE REGIONE (menu personalizzato, non un <select> nativo:
// più affidabile al tocco su alcuni browser/webview Android)
// ---------------------------------------------------------------
function popolaRegioni(){
  const regioni = [...new Set(comuni.map(c => c.regione).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'it'));

  elencoRegioni.innerHTML = '';
  regioni.forEach(r => {
    const voce = document.createElement('div');
    voce.className = 'suggerimento';
    voce.textContent = r;
    voce.addEventListener('click', () => impostaRegione(r));
    elencoRegioni.appendChild(voce);
  });

  campoRegione.textContent = "Scegli una regione...";
  campoRegione.classList.remove('disattivo');
}

campoRegione.addEventListener('click', () => {
  if (campoRegione.classList.contains('disattivo')) return;
  elencoRegioni.classList.toggle('visibile');
});

document.addEventListener('click', (evento) => {
  if (!evento.target.closest('.barra-regione')){
    elencoRegioni.classList.remove('visibile');
  }
});

function impostaRegione(nomeRegione){
  regioneSelezionata = nomeRegione;
  campoRegione.textContent = nomeRegione;
  elencoRegioni.classList.remove('visibile');

  campoRicerca.value = '';
  elencoSuggerimenti.classList.remove('visibile');
  senzaDati.style.display = 'none';
  bloccoAttrazioni.classList.remove('visibile');
  bloccoOggi.classList.remove('visibile');

  abilitaRicerca(`Cerca in ${regioneSelezionata}...`);
  statoVuoto.style.display = 'block';
  statoVuoto.textContent = `Scrivi il nome di una città o un paese in ${regioneSelezionata}`;
  statoRicerca.textContent = '';
  statoRicerca.className = 'stato-ricerca';
}

function abilitaRicerca(placeholder){
  campoRicerca.disabled = false;
  campoRicerca.placeholder = placeholder;
}

// comuni da usare per la ricerca corrente, filtrati per regione se necessario
function comuniFiltrati(){
  if (regioneSelezionata === "TUTTE" || !regioneSelezionata){
    return comuni;
  }
  return comuni.filter(c => c.regione === regioneSelezionata);
}


// ---------------------------------------------------------------
// AUTOCOMPLETAMENTO
// ---------------------------------------------------------------
campoRicerca.addEventListener('input', () => {
  const valore = campoRicerca.value.trim();
  senzaDati.style.display = 'none';

  if (!comuniPronti || valore.length < 2){
    elencoSuggerimenti.classList.remove('visibile');
    return;
  }

  const chiave = normalizza(valore);
  const corrispondenze = comuniFiltrati()
    .filter(c => normalizza(c.nome).includes(chiave))
    .sort((a, b) => normalizza(a.nome).indexOf(chiave) - normalizza(b.nome).indexOf(chiave))
    .slice(0, 8);

  if (corrispondenze.length === 0){
    elencoSuggerimenti.classList.remove('visibile');
    return;
  }

  elencoSuggerimenti.innerHTML = '';
  corrispondenze.forEach(c => {
    const voce = document.createElement('div');
    voce.className = 'suggerimento';
    voce.innerHTML = `<span>${c.nome}</span>${c.provincia ? `<span class="provincia">${c.provincia}</span>` : ''}`;
    voce.addEventListener('click', () => {
      campoRicerca.value = c.nome;
      elencoSuggerimenti.classList.remove('visibile');
      elaboraComune(c.nome);
    });
    elencoSuggerimenti.appendChild(voce);
  });
  elencoSuggerimenti.classList.add('visibile');
});

campoRicerca.addEventListener('keydown', (evento) => {
  if (evento.key === 'Enter'){
    evento.preventDefault();
    elencoSuggerimenti.classList.remove('visibile');
    verificaEProcessa(campoRicerca.value.trim());
  }
});

campoRicerca.addEventListener('blur', () => {
  setTimeout(() => elencoSuggerimenti.classList.remove('visibile'), 150);
});

document.addEventListener('click', (evento) => {
  if (!evento.target.closest('.barra-ricerca')){
    elencoSuggerimenti.classList.remove('visibile');
  }
});

// ---------------------------------------------------------------
// VALIDAZIONE: il dato scritto corrisponde a un comune reale
// della regione selezionata?
// ---------------------------------------------------------------
function verificaEProcessa(valore){
  if (!valore){ return; }

  if (!regioneSelezionata){
    statoRicerca.textContent = "Scegli prima una regione.";
    statoRicerca.className = 'stato-ricerca errore';
    return;
  }

  if (!comuniPronti){
    statoRicerca.textContent = "Sto ancora caricando l'elenco comuni, riprova tra un istante.";
    statoRicerca.className = 'stato-ricerca errore';
    return;
  }

  const chiave = normalizza(valore);
  const trovato = comuniFiltrati().find(c => normalizza(c.nome) === chiave);

  if (!trovato){
    const ambitoMessaggio = regioneSelezionata === "TUTTE" ? "" : ` in ${regioneSelezionata}`;
    statoRicerca.textContent = `"${valore}" non risulta un comune valido${ambitoMessaggio}. Controlla lo scritto.`;
    statoRicerca.className = 'stato-ricerca errore';
    bloccoAttrazioni.classList.remove('visibile');
    bloccoOggi.classList.remove('visibile');
    senzaDati.style.display = 'none';
    statoVuoto.style.display = 'block';
    return;
  }

  statoRicerca.textContent = elencoRidotto
    ? `Comune riconosciuto (lista ridotta): ${trovato.nome}.`
    : `Comune riconosciuto: ${trovato.nome}${trovato.provincia ? ' (' + trovato.provincia + ')' : ''}.`;
  statoRicerca.className = 'stato-ricerca ok';
  elaboraComune(trovato.nome);
}

// ---------------------------------------------------------------
// RICERCA IN TEMPO REALE CON L'API GRATUITA DI WIKIPEDIA (per i
// comuni senza scheda scritta a mano). Nessuna chiave richiesta:
// l'API pubblica di Wikimedia supporta le richieste dal browser
// tramite il parametro origin=*.
//
// Come funziona:
// 1) troviamo le coordinate geografiche della pagina Wikipedia del
//    comune (action=query, prop=coordinates)
// 2) cerchiamo le pagine Wikipedia più vicine a quel punto
//    (list=geosearch) — sono in genere monumenti, chiese, musei,
//    piazze storiche ecc.
// 3) prendiamo un breve estratto testuale pulito per ciascuna
//    (prop=extracts, senza markup da ripulire a mano)
// ---------------------------------------------------------------
const cacheAttrazioni = {}; // evita di richiedere due volte lo stesso comune

async function cercaConWikipedia(nomeComune){
  try {
    // 1) coordinate della pagina del comune
    const urlCoord = `https://it.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(nomeComune)}&prop=coordinates&format=json&origin=*`;
    const rispostaCoord = await fetch(urlCoord);
    const datiCoord = await rispostaCoord.json();
    const pagine = datiCoord.query && datiCoord.query.pages;
    if (!pagine) return null;

    const pagina = Object.values(pagine)[0];
    if (!pagina || pagina.missing !== undefined || !pagina.coordinates || !pagina.coordinates.length){
      return null;
    }
    const { lat, lon } = pagina.coordinates[0];

    // 2) punti di interesse nel raggio di ~9 km dal centro del comune
    const urlVicini = `https://it.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=9000&gslimit=20&format=json&origin=*`;
    const rispostaVicini = await fetch(urlVicini);
    const datiVicini = await rispostaVicini.json();
    const risultati = (datiVicini.query && datiVicini.query.geosearch) || [];
    if (!risultati.length) return null;

    const candidati = risultati
      .filter(r => normalizza(r.title) !== normalizza(nomeComune))
      .slice(0, 10);
    if (!candidati.length) return null;

    // 3) estratto testuale pulito per ciascun candidato (già senza markup)
    const idPagine = candidati.map(c => c.pageid).join('|');
    const urlEstratti = `https://it.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=1&explaintext=1&exsentences=2&pageids=${idPagine}&format=json&origin=*`;
    const rispostaEstratti = await fetch(urlEstratti);
    const datiEstratti = await rispostaEstratti.json();
    const paginePerId = (datiEstratti.query && datiEstratti.query.pages) || {};

    const attrazioni = candidati
      .map(c => {
        const info = paginePerId[c.pageid];
        const estratto = (info && info.extract) ? info.extract.trim() : '';
        return { nome: c.title, descrizione: estratto };
      })
      // scarta pagine senza estratto o che sono a loro volta altri comuni/frazioni
      // (poco utili come "cosa vedere", sono luoghi non attrazioni)
      .filter(a => a.descrizione && !/\bè\s+(un|una)\s+(comune|frazione|localit[àa])\b/i.test(a.descrizione))
      .slice(0, 3);

    return attrazioni.length ? attrazioni : null;
  } catch (errore) {
    return null;
  }
}

// ---------------------------------------------------------------
// UNA VOLTA VALIDATO IL COMUNE: usa la scheda scritta a mano se
// esiste, altrimenti cerca in tempo reale con l'API di Wikipedia.
// ---------------------------------------------------------------
async function elaboraComune(nomeComune){
  statoVuoto.style.display = 'none';
  senzaDati.style.display = 'none';

  const nomeChiave = Object.keys(DATI).find(k => normalizza(k) === normalizza(nomeComune));

  if (nomeChiave){
    mostraRisultato(nomeChiave, DATI[nomeChiave].attrazioni.slice(0, 3), true);
    return;
  }

  bloccoAttrazioni.classList.remove('visibile');
  bloccoOggi.classList.remove('visibile');
  senzaDati.style.display = 'block';
  senzaDati.innerHTML = `Sto cercando informazioni su <strong>${nomeComune}</strong>...`;

  const chiaveCache = normalizza(nomeComune);
  let attrazioniTrovate = cacheAttrazioni[chiaveCache];
  if (attrazioniTrovate === undefined){
    attrazioniTrovate = await cercaConWikipedia(nomeComune);
    cacheAttrazioni[chiaveCache] = attrazioniTrovate;
  }

  if (attrazioniTrovate && attrazioniTrovate.length){
    senzaDati.style.display = 'none';
    mostraRisultato(nomeComune, attrazioniTrovate, false);
  } else {
    senzaDati.innerHTML = `Non ho trovato informazioni turistiche su <strong>${nomeComune}</strong>. Potrebbe essere un paese molto piccolo o senza pagine dedicate nelle vicinanze.`;
  }
}

function mostraRisultato(nomeCitta, elencoAttrazioni, curata){
  bloccoAttrazioni.classList.add('visibile');

  listaAttrazioniEl.innerHTML = '';
  elencoAttrazioni.forEach((attrazione, indice) => {
    const biglietto = document.createElement('div');
    biglietto.className = 'biglietto';
    biglietto.innerHTML = `
      <div class="biglietto-intestazione">
        <span class="biglietto-numero">${String(indice+1).padStart(2,'0')}</span>
        <span class="biglietto-nome">${attrazione.nome}</span>
        <span class="biglietto-freccia">⌄</span>
      </div>
      <div class="biglietto-corpo"><p>${attrazione.descrizione}</p></div>
    `;
    biglietto.querySelector('.biglietto-intestazione').addEventListener('click', () => {
      biglietto.classList.toggle('aperto');
    });
    listaAttrazioniEl.appendChild(biglietto);
  });

  if (!curata){
    const nota = document.createElement('p');
    nota.className = 'sotto-blocco';
    nota.style.marginTop = '10px';
    nota.textContent = 'Fonte: Wikipedia — luoghi trovati automaticamente vicino al comune, potrebbero includere qualche imprecisione.';
    listaAttrazioniEl.appendChild(nota);
  }

  bloccoOggi.classList.add('visibile');
  oggiData.textContent = dataLeggibile;
  oggiTitolo.textContent = `Oggi a ${nomeCitta}`;
  listaEventi.innerHTML = '';
  const eventiOggi = EVENTI[`${nomeCitta}|${chiaveData}`];
  if (eventiOggi && eventiOggi.length){
    eventiOggi.forEach(evento => {
      const riga = document.createElement('div');
      riga.className = 'evento-riga';
      riga.innerHTML = `<span class="evento-pallino"></span><span class="evento-testo">${evento}</span>`;
      listaEventi.appendChild(riga);
    });
  } else if (curata){
    listaEventi.innerHTML = `<p class="nessun-evento">Nessun evento speciale segnalato per oggi in questa città.</p>`;
  } else {
    listaEventi.innerHTML = `<p class="nessun-evento">Dati sugli eventi non disponibili per questo comune.</p>`;
  }
}
